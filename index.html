<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAMVEST Özel Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --text-main: #f5f5f5;
            --text-muted: #999999;
            --accent-red: #d32f2f;
            --accent-hover: #b71c1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #333;
            background-color: var(--surface-color);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            gap: 4rem;
        }

        .player-wrapper {
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(211, 47, 47, 0.1);
            color: var(--accent-red);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge.playing .dot {
            animation: blink 1.5s infinite;
        }

        /* Yükleniyor durumu için turuncu/sarı badge rengi */
        .status-badge.loading {
            background-color: rgba(243, 156, 18, 0.1);
            color: #f39c12;
        }
        
        .status-badge.loading .dot {
            background-color: #f39c12;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .play-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
            background-color: #ffffff;
        }

        .play-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
            transform: none;
        }

        .play-text {
            margin-top: 1rem;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .quote-container {
            max-width: 600px;
            text-align: center;
            padding: 0 20px;
        }

        .quote-container p {
            font-size: 1.2rem;
            font-weight: 300;
            font-style: italic;
            color: #cccccc;
            margin-bottom: 1.5rem;
        }

        .signature {
            height: 55px;
            filter: invert(1) opacity(0.8); 
            user-select: none;
            pointer-events: none;
        }

        footer {
            background-color: var(--surface-color);
            padding: 3rem 1rem 2rem;
            text-align: center;
            border-top: 1px solid #333;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .footer-logos img {
            height: 70px;
            width: auto;
            object-fit: contain;
        }

        .footer-content h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .footer-content p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>PAMVEST Özel Radyo</h1>
    </header>

    <main>
        <div class="player-wrapper">
            <div class="status-badge" id="status-badge">
                <span class="dot"></span> <span id="status-text">Yayın Bekleniyor</span>
            </div>
            
            <audio id="radio-audio" src="https://stream-radyo.pamvestozel.club/" preload="none"></audio>
            
            <button class="play-btn" id="play-btn" aria-label="Oynat/Durdur">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            <div class="play-text" id="play-text">Yayını Başlat</div>
        </div>

        <div class="quote-container">
            <p>"Sanatsız kalan bir milletin hayat damarlarından biri kopmuş demektir."</p>
            <img class="signature" src="https://upload.wikimedia.org/wikipedia/commons/4/46/Signature_of_Mustafa_Kemal_Atat%C3%BCrk.svg" alt="Mustafa Kemal Atatürk İmza">
        </div>
    </main>

    <footer>
        <div class="footer-logos">
            <img src="https://karsi-lasma.pamvestozel.club/static/resimler/footer/pamvestozel.png" alt="Pamvest Özel">
            <img src="https://karsi-lasma.pamvestozel.club/static/resimler/footer/girisimcilik.png" alt="ŞÖFL Girişimcilik Kulübü">
        </div>
        
        <div class="footer-content">
            <h3>PAMVEST Özel ve ŞÖFL Girişimcilik Kulübü Katkılarıyla.</h3>
            <p>Bu yayın ticari amaç taşımaz. Tamamen eğitim ve kültür amaçlıdır.</p>
        </div>
    </footer>

    <script>
        const audio = document.getElementById('radio-audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const playText = document.getElementById('play-text');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');

        // Butona tıklandığında (Kullanıcı eylemi)
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                // Sesi başlat komutu veriyoruz, ama henüz ses gelmeyebilir
                audio.play();
                
                // Yükleniyor arayüzüne geçiş
                playIcon.className = 'fas fa-spinner fa-spin';
                playText.innerText = "Bağlanıyor...";
                
                statusBadge.classList.remove('playing');
                statusBadge.classList.add('loading');
                statusText.innerText = "Bağlantı Kuruluyor";
            } else {
                // Sesi durdur
                audio.pause();
                
                // Başlangıç arayüzüne geri dön
                playIcon.className = 'fas fa-play';
                playText.innerText = "Yayını Başlat";
                
                statusBadge.classList.remove('playing', 'loading');
                statusText.innerText = "Yayın Bekleniyor";
            }
        });

        // Ses dosyası GERÇEKTEN oynamaya başladığında tetiklenir (Buffering bittiğinde)
        audio.addEventListener('playing', () => {
            playIcon.className = 'fas fa-pause';
            playText.innerText = "Yayın Dinleniyor";
            
            statusBadge.classList.remove('loading');
            statusBadge.classList.add('playing');
            statusText.innerText = "Canlı Yayın";
        });

        // İnternet yavaşlar ve yayın donarsa (Buffering sırasında) tetiklenir
        audio.addEventListener('waiting', () => {
            playIcon.className = 'fas fa-spinner fa-spin';
            playText.innerText = "Ara belleğe alınıyor...";
            
            statusBadge.classList.remove('playing');
            statusBadge.classList.add('loading');
            statusText.innerText = "Yükleniyor";
        });
    </script>
</body>
</html>
